server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://127.0.0.1:3306/shorturl?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${DB_USER:shorturl}
    password: ${DB_PASS:shorturl123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

logging:
  level:
    com.zaxxer.hikari: WARN
    com.shorturl: INFO

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

short-url:
  base-url: ${BASE_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET:shorturl-jwt-secret-key-must-be-at-least-32-chars-long}
  expiration: 86400000
